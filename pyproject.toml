[project]
name = "aiko_chat_gateway"
version = "0.0.1"
description = "Self-hosted gateway: stable WSS+REST contract over the aiko_chat MQTT backbone"
# aiko_services 0.6 caps at <=3.13.0 (verified in Phase 0 spike) -> target 3.12.
requires-python = ">=3.12,<3.13"

dependencies = [
  # aiko_services + aiko_chat are installed editable from the local checkouts
  # (see ReadMe); not on PyPI under a 3.12-compatible pin here.
  "fastapi>=0.115",
  "uvicorn[standard]>=0.32",
  "pydantic-settings>=2.6",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.3",
  "pytest-asyncio>=0.24",
  "httpx>=0.27",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aiko_gateway"]
