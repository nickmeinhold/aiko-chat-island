# Aiko Chat Gateway — production compose.
#
# SELF-CONTAINED aiko mesh (islands prereq-0 decouple, design 02). The gateway no
# longer borrows the matrix bridge stack's broker — it runs its OWN aiko mesh
# (mosquitto + registrar + ChatServer) in this compose project, on this project's
# own default network. This is what makes the gateway portable: an island is this
# same compose on a different host + domain + JWT secret.
#
# Three non-obvious choices, all grounded on the live host (design 02, verified
# 2026-06-30) — NOT assumed:
#
#  1. MESH, NOT MATRIX. The gateway reads canonical CHANNEL topology from the aiko
#     ChatServer (`aiko-chat`) via an ECConsumer(channel_list) share, discovered
#     through the registrar. The matrix↔aiko BRIDGE is deliberately ABSENT here —
#     it only injects matrix-originated messages and is not a topology source, so
#     an independent island doesn't run it (Option A: matrix interop diverges).
#
#  2. STORE — DB_URL points at file-backed SQLite on a named volume (the #1281
#     single-home thesis; aiosqlite is a declared prod dep). config.py defaults to
#     file-backed SQLite too now, so dev matches prod; deploy pins the absolute
#     /data path here.
#
#  3. IMAGE — the three mesh roles share `aiko-bridge:latest`, built from
#     github.com/nickmeinhold/aiko-chat-bridge (the role is chosen by `command`).
#     On imagineering the image is already present. A NEW island host must build
#     it first: `git clone …/aiko-chat-bridge && docker build -t aiko-bridge:latest
#     aiko-chat-bridge` (or pull a pinned tag from a registry).
#
# The gateway port publish binds 127.0.0.1 only — Caddy reverse-proxies
# localhost:8095 and terminates TLS. The broker publishes NO host port (internal
# to this project's network), so the anonymous mosquitto.conf is safe.

# Compose PROJECT name is pinned here (not derived from the host dir basename) so
# container/network/volume prefixes are stable no matter what the checkout is called.
# The DB lives on an EXTERNAL volume (aiko_data, below) so this name can change freely
# without ever reprojecting the store.
name: aiko

services:
  chat-island:
    build: .
    image: aiko-chat-island:latest
    restart: always
    # Reachable by Caddy on the host loopback; never exposed off-host directly.
    ports:
      - "127.0.0.1:8095:8095"
    environment:
      # Explicit prod declaration arms config.py's fail-closed JWT guard
      # (a weak/dev secret crashes the boot — see config.py).
      ENVIRONMENT: production
      # Compose-level fail-closed: refuse to even render without a JWT_SECRET in
      # the env (the deploy script writes it from SOPS). Belt-and-suspenders with
      # the app-level >=32-char guard.
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET required (SOPS-managed, >=32 chars)}
      # File-backed SQLite on the persistent volume below (4 slashes = absolute
      # path /data/aiko.db). aiosqlite dialect ships in the image (prod dep).
      DB_URL: sqlite+aiosqlite:////data/aiko.db
      # aiko bus — OUR own broker, by service name on this project's network.
      AIKO_MQTT_HOST: mosquitto
      AIKO_MQTT_PORT: "1883"
      AIKO_NAMESPACE: aiko
      # --- social sign-in (#13). Client IDs are PUBLIC (native ID-token flow has
      # no client secret), baked here as the live prod default; the host .env
      # override stays optional. JWT_SECRET is the ONE secret and stays in SOPS.
      # *_CLIENT_IDS MUST be JSON arrays (pydantic json-decodes list fields).
      SOCIAL_SIGNIN_ENABLED: ${SOCIAL_SIGNIN_ENABLED:-true}
      APPLE_CLIENT_IDS: ${APPLE_CLIENT_IDS:-["cc.imagineering.aikoChatApp"]}
      GOOGLE_CLIENT_IDS: ${GOOGLE_CLIENT_IDS:-["588100172166-a0r6ipvpju5rd6fh8lv85qqohpdosp33.apps.googleusercontent.com","588100172166-23ppgk6jdb3et2ehc1qj584c6rgs0c9j.apps.googleusercontent.com","588100172166-bagrmvftp3fcer2j2lvnh33j65g58elk.apps.googleusercontent.com"]}
      # --- OAuth broker (#21). GITHUB_CLIENT_SECRET is a REAL secret — NOT baked
      # here; both live only in the host .env. Absent → broker provider not listed
      # (fail-closed), and the both-or-neither default keeps the XOR boot-guard happy.
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      # --- WebAuthn passkeys (#1471 / #29). Endpoints deploy DARK; this knob flips
      # /providers advertisement on AFTER device e2e. Default false → stays dark
      # without the override. Public, not a secret.
      PASSKEY_ENABLED: ${PASSKEY_ENABLED:-false}
      # --- ISLAND IDENTITY (the compose is the island template). Each island sets
      # these in its host .env; the defaults are island 1 (chat.imagineering.cc) so
      # an imagineering deploy with no overrides is unchanged. Island 2 (enspyr)
      # sets GATEWAY_BASE_URL/_ID/_DISPLAY_NAME + PASSKEY_RP_ID to its own domain.
      GATEWAY_BASE_URL: ${GATEWAY_BASE_URL:-https://chat.imagineering.cc}
      GATEWAY_ID: ${GATEWAY_ID:-}
      GATEWAY_DISPLAY_NAME: ${GATEWAY_DISPLAY_NAME:-Aiko}
      # Directory SEED peers (#1548) — operator-curated FULL peer entries, merged
      # with NO network fetch (authentic by construction). THIS is how islands list
      # each other today: JSON array of {"id","display_name","base_url"}. Island 1
      # seeds enspyr; island 2 seeds imagineering. Safe with gossip off.
      GATEWAY_SEED_PEERS: ${GATEWAY_SEED_PEERS:-[]}
      # Gossip FETCH gate — fail-closed. The anti-entropy loop pulls peer base URLs
      # (SSRF surface, #1578), so it stays OFF until that hardening lands AND 3+
      # islands make transitive discovery worth it. Off → directory still serves
      # self + seed peers, no fetch.
      GATEWAY_GOSSIP_ENABLED: ${GATEWAY_GOSSIP_ENABLED:-false}
      # Peer-gossip bootstrap (#1546). JSON array of peer base URLs to FETCH. Only
      # consulted when GATEWAY_GOSSIP_ENABLED is true; leave empty (seed peers are
      # the fetch-free path).
      GATEWAY_BOOTSTRAP_PEERS: ${GATEWAY_BOOTSTRAP_PEERS:-[]}
      # Passkey RP id is domain-scoped — must match the serving host.
      PASSKEY_RP_ID: ${PASSKEY_RP_ID:-chat.imagineering.cc}
    volumes:
      # Persist the SQLite store across container recreates. External + stably named
      # so the store survives any project/service rename (see volumes: block).
      - aiko_data:/data
    depends_on:
      - chat

  # --- the gateway's OWN aiko mesh (design 02) -------------------------------
  # mosquitto (transport) + registrar (discovery) + ChatServer (channel/user
  # topology). No host ports; reachable only within this project's network.
  mosquitto:
    image: eclipse-mosquitto:2
    restart: always
    volumes:
      - ./deploy/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data

  registrar:
    image: aiko-bridge:latest
    restart: always
    environment:
      AIKO_MQTT_HOST: mosquitto
      AIKO_NAMESPACE: aiko
    command: ["aiko_registrar"]
    depends_on:
      - mosquitto

  chat:
    image: aiko-bridge:latest
    restart: always
    environment:
      AIKO_MQTT_HOST: mosquitto
      AIKO_NAMESPACE: aiko
    # geekscape/aiko_chat bootstraps its HyperSpace (channels: general/llm/random/
    # robot/yolo) before `aiko_chat run`; chat_start.sh does that idempotently from
    # the _chat_server_ working dir it creates. Verified to reproduce the live
    # 5-channel set exactly (design 02 §5 — the cutover data-safety condition).
    command: ["bash", "-c", "cd /tmp && exec bash /opt/aiko_chat/src/aiko_chat/chat_start.sh"]
    depends_on:
      - registrar

volumes:
  # EXTERNAL + stably named: the store is decoupled from the compose project name, so
  # renaming the project never reprojects (and never silently empties) the live DB.
  # One-time prod cutover: `docker volume create aiko_data` then copy the old
  # aiko-chat-gateway_aiko_gateway_data into it (see deploy runbook).
  aiko_data:
    external: true
    name: aiko_data
  # Broker state is transport-only (rebuilt on reconnect); a plain managed volume.
  mosquitto_data:
