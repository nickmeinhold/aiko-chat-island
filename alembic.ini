# Alembic config for the aiko chat gateway.
#
# The database URL is NOT set here — env.py reads it from the app settings
# (config.settings.db_url) so migrations always target the SAME database the
# app does (Postgres in dev, file-backed SQLite in deploy), driven by one
# DB_URL env var. Keep this file dialect-agnostic.
[alembic]
script_location = alembic
# Make `src/` importable so env.py can `import aiko_gateway...` without an
# install step (mirrors pyproject's [tool.pytest.ini_options] pythonpath).
prepend_sys_path = src
# Use os.pathsep for prepend_sys_path (alembic 1.x deprecates the legacy
# space/comma/colon splitting); a single entry is unaffected either way.
path_separator = os
# ULID-friendly, sortable revision filenames: 0001_slug, 0002_slug, ...
# (we hand-number rather than use random hashes so the linear history reads in
# order — there is a single deployment line, no divergent branches).
file_template = %%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
