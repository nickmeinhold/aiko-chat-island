# Phase 0 spike broker — local only, anonymous. NOT a production config.
# Ports 1884/9002 (NOT 1883/9001) to stay clear of any stale local aiko stack
# already holding the default ports.
listener 1884 127.0.0.1
allow_anonymous true
# WebSocket listener (the gateway/app path will use WSS; broker WS is for parity testing)
listener 9002 127.0.0.1
protocol websockets
