# Mosquitto config for the gateway's OWN aiko bus (islands prereq-0 decouple).
#
# Vendored from aiko-chat-bridge/deploy/mosquitto.conf so the gateway compose
# project is self-contained — it no longer borrows the matrix stack's broker.
#
# anonymous is acceptable because the broker publishes NO host port (compose
# internal-network only; see docker-compose.yml). Nothing off the gateway's own
# network can reach 1883. If a future island ever exposes the broker off-host,
# this MUST gain auth first.
listener 1883 0.0.0.0
allow_anonymous true
persistence true
persistence_location /mosquitto/data/
